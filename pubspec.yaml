name: taskmaster_pro
description: TaskMaster Pro - A comprehensive task management app with scheduling, reminders, and sub-tasks.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.1
  intl: ^0.18.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  table_calendar: ^3.0.9
  flutter_colorpicker: ^1.0.3
  uuid: ^4.2.1
  share_plus: ^7.2.1
  flutter_animate: ^4.3.0
  google_fonts: ^4.0.4
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/icon/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/

dependency_overrides:
  win32: 5.5.1
